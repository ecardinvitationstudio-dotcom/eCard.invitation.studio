<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary gradient for accents -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial glow -->
    <radialGradient id="glowRadial">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.4" flood-color="#D946EF"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="100" fill="url(#glowRadial)"/>
  
  <!-- Outer circles -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#primaryGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  
  <!-- Main design group -->
  <g transform="translate(100, 100)">
    
    <!-- Envelope background -->
    <g filter="url(#shadow)">
      <!-- Envelope body -->
      <rect x="-55" y="-35" width="110" height="70" rx="8" fill="#FFFFFF" stroke="url(#primaryGrad)" stroke-width="2.5"/>
      
      <!-- Envelope flap -->
      <path d="M -55 -35 L 0 2 L 55 -35" fill="url(#primaryGrad)" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>
      
      <!-- Flap highlight -->
      <path d="M -55 -35 L 0 -5 L 20 -35" fill="white" opacity="0.2" stroke="none"/>
    </g>
    
    <!-- Decorative seal -->
    <circle cx="0" cy="22" r="16" fill="url(#primaryGrad)" opacity="0.95" filter="url(#glow)"/>
    <circle cx="0" cy="22" r="14" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Heart inside seal -->
    <g transform="translate(0, 22) scale(0.75)">
      <path d="M 0,-8 C -6,-14 -16,-14 -16,-6 C -16,4 -8,12 0,18 C 8,12 16,4 16,-6 C 16,-14 6,-14 0,-8 Z" 
            fill="white" opacity="0.95" filter="url(#innerGlow)"/>
    </g>
    
    <!-- Stylized 'e' letter -->
    <g transform="translate(-25, -8)">
      <text x="0" y="0" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#primaryGrad)" 
            filter="url(#glow)" opacity="0.9">e</text>
    </g>
    
    <!-- Horizontal envelope lines -->
    <line x1="-50" y1="-25" x2="50" y2="-25" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.3"/>
    <line x1="-48" y1="10" x2="48" y2="10" stroke="url(#primaryGrad)" stroke-width="0.8" opacity="0.2"/>
    
    <!-- Accent sparkles -->
    <g filter="url(#glow)">
      <!-- Top left -->
      <circle cx="-40" cy="-20" r="2.5" fill="url(#accentGrad)"/>
      <circle cx="-40" cy="-20" r="1" fill="white" opacity="0.8"/>
      
      <!-- Top right -->
      <circle cx="40" cy="-20" r="2.5" fill="url(#accentGrad)"/>
      <circle cx="40" cy="-20" r="1" fill="white" opacity="0.8"/>
      
      <!-- Side accents -->
      <circle cx="-60" cy="0" r="1.8" fill="url(#accentGrad)" opacity="0.9"/>
      <circle cx="60" cy="0" r="1.8" fill="url(#accentGrad)" opacity="0.9"/>
    </g>
    
    <!-- Decorative ribbon/line accent -->
    <rect x="-4" y="-3" width="8" height="20" rx="2" fill="url(#accentGrad)" opacity="0.12" stroke="url(#accentGrad)" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>
  
  <!-- Corner decorative elements -->
  <g fill="url(#accentGrad)" opacity="0.5" filter="url(#glow)">
    <circle cx="12" cy="12" r="2.5"/>
    <circle cx="188" cy="12" r="2.5"/>
    <circle cx="12" cy="188" r="2.5"/>
    <circle cx="188" cy="188" r="2.5"/>
  </g>
  
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.4" stroke-dasharray="2,3"/>
</svg>